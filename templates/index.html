<!DOCTYPE html>

<html>
<head>
<title>Daily Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.55)),
url("{{ url_for('static', filename='images/background.jpg') }}")
no-repeat center/cover;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

.container{
width:720px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:18px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
color:white;
}

h2{
text-align:center;
margin-bottom:20px;
}

h3{
margin-top:15px;
margin-bottom:8px;
}

input,select{
width:100%;
padding:11px;
border:none;
border-radius:8px;
margin:6px 0 12px;
outline:none;
}

button{
padding:10px 16px;
background:linear-gradient(45deg,#ff9a3c,#ff6a00);
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

.logout{
background:#ff4d4d;
margin-bottom:10px;
}

hr{
border:none;
height:1px;
background:rgba(255,255,255,0.3);
margin:20px 0;
}

/* progress */

.progress-container{
background:rgba(255,255,255,0.25);
height:10px;
border-radius:20px;
margin-bottom:15px;
}

.progress-bar{
height:10px;
border-radius:20px;
background:#ff9a3c;
width:0%;
transition:0.4s;
}

/* section */

.section-title{
margin-top:20px;
font-weight:600;
padding:6px 10px;
border-left:4px solid #ffa94d;
background:rgba(255,255,255,0.08);
border-radius:6px;
}

/* task card */

.task{
display:flex;
align-items:center;
gap:12px;
background:rgba(255,255,255,0.18);
padding:12px;
border-radius:12px;
margin-top:10px;
}

.task-time{
font-weight:600;
color:#ffd27f;
min-width:60px;
}

.task-title{
flex:1;
}

.delete{
background:#ff4d4d;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.completed span{
text-decoration:line-through;
opacity:0.6;
}

.upcoming{
border:2px solid #ffd27f;
}

</style>

</head>

<body>

<div class="container">

<h2>🌅 Daily Planner</h2>

<h3>Register</h3>
<input id="regName" placeholder="Name">
<input id="regEmail" placeholder="Email">
<button onclick="register()">Register</button>

<hr>

<h3>Login</h3>
<input id="loginEmail" placeholder="Email">
<button onclick="login()">Login</button>

<hr>

<div id="planner" style="display:none;">

<h3>Welcome <span id="username"></span></h3>
<button class="logout" onclick="logout()">Logout</button>

<div class="progress-container">
<div id="progressBar" class="progress-bar"></div>
</div>

<hr>

<h3>Add Task</h3>

<input id="title" placeholder="Task name">

<select id="time">
<option value="">No specific time</option>
</select>

<button onclick="addTask()">Add Task</button>

<hr>

<h3>Your Planner</h3>
<div id="tasks"></div>

</div>
</div>

<script>

let currentUserId = localStorage.getItem("userId");
let currentUserName = localStorage.getItem("name");

/* generate time */

function generateTimes(){

const select=document.getElementById("time");

for(let h=0;h<24;h++){

for(let m=0;m<60;m+=15){

let hh=String(h).padStart(2,"0");
let mm=String(m).padStart(2,"0");

select.innerHTML+=`<option value="${hh}:${mm}">${hh}:${mm}</option>`;

}

}

}

generateTimes();

/* detect period */

function detectPeriod(time){

let hour=parseInt(time.split(":")[0]);

if(hour<12) return "Morning";
if(hour<17) return "Afternoon";

return "Evening";

}

/* auto assign */

function autoAssignTime(){

return "08:00";

}

/* auto login */

if(currentUserId){

planner.style.display="block";
username.innerText=currentUserName;

fetch(`/daily-reset/${currentUserId}`,{
method:"POST"
}).then(()=>loadTasks());

}

/* register */

async function register(){

const res=await fetch("/register",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
name:regName.value,
email:regEmail.value
})

});

const data=await res.json();
alert(data.message);

}

/* login */

async function login(){

const res=await fetch("/login",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
email:loginEmail.value
})

});

const data=await res.json();
alert(data.message);

if(data.userId){

currentUserId=data.userId;
currentUserName=data.name;

localStorage.setItem("userId",data.userId);
localStorage.setItem("name",data.name);

planner.style.display="block";
username.innerText=data.name;

await fetch(`/daily-reset/${currentUserId}`,{method:"POST"});

loadTasks();

}

}

/* logout */

function logout(){

localStorage.clear();
location.reload();

}

/* add task */

async function addTask(){

let title=document.getElementById("title").value;
let time=document.getElementById("time").value;

if(time===""){
time=autoAssignTime();
}

let category=detectPeriod(time);

await fetch("/add-task",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
userId:currentUserId,
title,
time,
category
})

});

loadTasks();

}

/* load tasks */

async function loadTasks(){

const res=await fetch(`/tasks/${currentUserId}`);
const tasks=await res.json();

tasksDiv.innerHTML="";

const groups={Morning:[],Afternoon:[],Evening:[]};

tasks.forEach(t=>groups[t.category]?.push(t));

for(let g in groups){
groups[g].sort((a,b)=>a.time.localeCompare(b.time));
}

/* progress */

let completed=tasks.filter(t=>t.completed).length;
let progress=(completed/tasks.length)*100 || 0;

progressBar.style.width=progress+"%";

/* upcoming */

let nextTask=null;

tasks.forEach(t=>{
if(!t.completed){
if(!nextTask || t.time<nextTask.time){
nextTask=t;
}
}
});

/* render */

for(let sec in groups){

tasksDiv.innerHTML+=`<div class="section-title">${sec}</div>`;

groups[sec].forEach(task=>{

let highlight=(nextTask && task._id===nextTask._id)?"upcoming":"";

tasksDiv.innerHTML+=`

<div class="task ${task.completed?"completed":""} ${highlight}">

<input type="checkbox"
${task.completed?"checked":""}
onchange="toggleTask('${task._id}',this.checked)">

<div class="task-time">${task.time}</div>

<div class="task-title">${task.title}</div>

<button class="delete" onclick="deleteTask('${task._id}')">
🗑
</button>

</div>

`;

});

}

}

/* toggle */

async function toggleTask(id,completed){

await fetch(`/task/${id}`,{

method:"PUT",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({completed})

});

loadTasks();

}

/* delete */

async function deleteTask(id){

await fetch(`/task/${id}`,{
method:"DELETE"
});

loadTasks();

}

const tasksDiv=document.getElementById("tasks");

</script>

</body>
</html>
