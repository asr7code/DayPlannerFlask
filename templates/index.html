<!DOCTYPE html>

<html>
<head>
<title>Daily Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.55)),
url("{{ url_for('static', filename='images/background.jpg') }}")
no-repeat center/cover;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

/* MAIN CARD */

.container{
width:720px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:18px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
color:white;
}

/* HEADINGS */

h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
letter-spacing:1px;
}

h3{
margin-top:15px;
margin-bottom:8px;
font-weight:500;
}

/* INPUTS */

input,select{
width:100%;
padding:11px;
border:none;
border-radius:8px;
margin:6px 0 12px;
outline:none;
font-size:14px;
}

/* BUTTONS */

button{
padding:10px 16px;
background:linear-gradient(45deg,#ff9a3c,#ff6a00);
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:500;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

/* LOGOUT */

.logout{
background:#ff4d4d;
margin-bottom:10px;
}

/* HR */

hr{
border:none;
height:1px;
background:rgba(255,255,255,0.3);
margin:20px 0;
}

/* SECTION TITLES */

.section-title{
margin-top:20px;
font-weight:600;
padding:6px 10px;
border-left:4px solid #ffa94d;
background:rgba(255,255,255,0.08);
border-radius:6px;
}

/* TASK ITEM */

.task{
display:flex;
align-items:center;
gap:10px;
background:rgba(255,255,255,0.15);
padding:10px 12px;
border-radius:10px;
margin-top:8px;
transition:0.2s;
}

.task:hover{
background:rgba(255,255,255,0.25);
}

.task span{
flex:1;
}

/* COMPLETED */

.completed span{
text-decoration:line-through;
opacity:0.6;
}

</style>

</head>

<body>

<div class="container">

<h2>🌅 Daily Planner</h2>

<h3>Register</h3>
<input id="regName" placeholder="Your Name">
<input id="regEmail" placeholder="Your Email">
<button onclick="register()">Register</button>

<hr>

<h3>Login</h3>
<input id="loginEmail" placeholder="Enter Email">
<button onclick="login()">Login</button>

<hr>

<div id="planner" style="display:none;">

<h3>Welcome <span id="username"></span></h3>
<button class="logout" onclick="logout()">Logout</button>

<hr>

<h3>Add Task</h3>

<input id="title" placeholder="Task name">

<select id="time"></select>

<select id="category">
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
</select>

<button onclick="addTask()">Add Task</button>

<hr>

<h3>Your Planner</h3>
<div id="tasks"></div>

</div>
</div>

<script>

let currentUserId = localStorage.getItem("userId");
let currentUserName = localStorage.getItem("name");

/* GENERATE TIME OPTIONS */

function generateTimes(){

const select=document.getElementById("time");

for(let h=0;h<24;h++){

for(let m=0;m<60;m+=15){

let hh=String(h).padStart(2,"0");
let mm=String(m).padStart(2,"0");

select.innerHTML+=`<option>${hh}:${mm}</option>`;

}

}

}

generateTimes();

/* AUTO LOGIN */

if(currentUserId){

planner.style.display="block";
username.innerText=currentUserName;

fetch(`/daily-reset/${currentUserId}`,{
method:"POST"
}).then(()=>loadTasks());

}

/* REGISTER */

async function register(){

const name=regName.value;
const email=regEmail.value;

const res=await fetch("/register",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({name,email})

});

const data=await res.json();

alert(data.message);

}

/* LOGIN */

async function login(){

const email=loginEmail.value;

const res=await fetch("/login",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({email})

});

const data=await res.json();

alert(data.message);

if(data.userId){

currentUserId=data.userId;
currentUserName=data.name;

localStorage.setItem("userId",data.userId);
localStorage.setItem("name",data.name);

planner.style.display="block";
username.innerText=data.name;

await fetch(`/daily-reset/${currentUserId}`,{
method:"POST"
});

loadTasks();

}

}

/* LOGOUT */

function logout(){

localStorage.clear();
location.reload();

}

/* ADD TASK */

async function addTask(){

const title=document.getElementById("title").value;
const time=document.getElementById("time").value;
const category=document.getElementById("category").value;

await fetch("/add-task",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
userId:currentUserId,
title,
time,
category
})

});

loadTasks();

}

/* LOAD TASKS */

async function loadTasks(){

const res=await fetch(`/tasks/${currentUserId}`);
const tasks=await res.json();

tasksDiv.innerHTML="";

const groups={Morning:[],Afternoon:[],Evening:[]};

tasks.forEach(t=>{
groups[t.category]?.push(t);
});

/* SORT TASKS BY TIME */

for(let g in groups){
groups[g].sort((a,b)=>{
return a.time.localeCompare(b.time);
});
}

for(let sec in groups){

tasksDiv.innerHTML+=`<div class="section-title">${sec}</div>`;

groups[sec].forEach(task=>{

tasksDiv.innerHTML+=`
<div class="task ${task.completed ? "completed":""}">
<input type="checkbox"
${task.completed ? "checked":""}
onchange="toggleTask('${task._id}',this.checked)">

<span>${task.title} • ${task.time}</span>
</div>
`;

});

}

}

/* TOGGLE TASK */

async function toggleTask(id,completed){

await fetch(`/task/${id}`,{

method:"PUT",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({completed})

});

loadTasks();

}

const tasksDiv=document.getElementById("tasks");

</script>

</body>
</html>
